name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      LITELLM_API_KEY: placeholder-key
      # Set TEST_EMAIL / TEST_PASSWORD in repo secrets to enable logged-in tests
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Start Streamlit
        run: streamlit run app.py --server.port 8501 --server.headless true &

      - name: Wait for Streamlit to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8501/_stcore/health && break
            sleep 2
          done

      - name: Run e2e tests
        run: pytest tests/e2e/ -v --tb=short

      - name: Upload Playwright traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
